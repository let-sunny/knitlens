<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#135bec",
              "background-light": "#f6f6f8",
              "background-dark": "#101622",
            },
            fontFamily: {
              display: ["Inter", "system-ui", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0px",
              lg: "0px",
              xl: "0px",
              full: "0px",
            },
          },
        },
      };
    </script>
    <style>
      /* Macintosh System 7 Aesthetic Overrides */
      .mac-border {
        box-shadow:
          1px 1px 0px #000,
          2px 2px 0px #000;
        border: 2px solid #000;
      }
      .mac-window-header {
        background: repeating-linear-gradient(
          0deg,
          #000,
          #000 1px,
          transparent 1px,
          transparent 2px
        );
        background-size: 100% 2px;
      }
      .mac-button {
        box-shadow: 1px 1px 0px #000;
        border: 1px solid #000;
      }
      .mac-button:active {
        box-shadow: inset 1px 1px 0px #000;
        transform: translate(1px, 1px);
      }
      .mac-radio-custom {
        appearance: none;
        width: 16px;
        height: 16px;
        border: 1px solid black;
        border-radius: 50% !important;
        background: white;
        position: relative;
        cursor: pointer;
      }
      .mac-radio-custom:checked::after {
        content: "";
        position: absolute;
        top: 3px;
        left: 3px;
        width: 8px;
        height: 8px;
        background: black;
        border-radius: 50%;
      }
      .chicago-vibe {
        font-family: "Inter", sans-serif;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
    </style>
  </head>
  <body class="bg-slate-300 font-display text-black">
    <div
      class="relative flex h-auto min-h-screen w-full flex-col items-center justify-center p-4"
    >
      <!-- Main Window Container -->
      <div class="w-full max-w-2xl bg-white mac-border overflow-hidden">
        <!-- Window Title Bar -->
        <div
          class="flex items-center justify-between border-b-2 border-black h-8 px-2 bg-white"
        >
          <div class="flex gap-1">
            <div
              class="w-4 h-4 border border-black bg-white flex items-center justify-center cursor-pointer"
            >
              <span class="material-symbols-outlined text-[12px] font-bold"
                >close</span
              >
            </div>
          </div>
          <div class="flex-1 px-4 h-full flex items-center justify-center">
            <div
              class="w-full h-4 mac-window-header flex items-center justify-center"
            >
              <span
                class="bg-white px-4 text-xs chicago-vibe uppercase tracking-wider"
                >Pattern Assistant</span
              >
            </div>
          </div>
          <div class="w-4 h-4 border border-black bg-white"></div>
        </div>
        <!-- Content Area -->
        <div class="p-6">
          <!-- Alert/Clarification Card -->
          <div
            class="flex flex-col @xl:flex-row gap-6 mb-8 border border-black p-4 bg-white"
          >
            <div
              class="w-32 h-32 border-2 border-black flex-shrink-0 bg-slate-100 flex items-center justify-center"
            >
              <div
                class="w-full h-full bg-slate-200"
                data-alt="Abstract pixelated knitting pattern icon"
                style="
                  background-image: repeating-linear-gradient(
                    45deg,
                    #cbd5e1 0,
                    #cbd5e1 1px,
                    transparent 0,
                    transparent 50%
                  );
                  background-size: 4px 4px;
                "
              ></div>
            </div>
            <div class="flex flex-col justify-center">
              <h2 class="text-xl chicago-vibe mb-2 uppercase">
                Size Selection
              </h2>
              <p
                class="text-sm leading-tight border-l-4 border-black pl-3 py-1"
              >
                I detected multiple size instructions in this pattern. Which
                size are you following?
              </p>
            </div>
          </div>
          <!-- Question -->
          <div class="mb-6">
            <h3 class="text-lg chicago-vibe mb-4 border-b-2 border-black pb-1">
              Please select your target size:
            </h3>
            <div class="flex flex-col gap-4">
              <!-- Option 1: Small -->
              <label
                class="flex items-start gap-3 p-3 cursor-pointer hover:bg-slate-50 border border-transparent hover:border-black transition-colors"
              >
                <input
                  checked=""
                  class="mac-radio-custom mt-1"
                  name="size-selection"
                  type="radio"
                />
                <div class="flex flex-col">
                  <span class="text-sm chicago-vibe uppercase"
                    >Small (1st number)</span
                  >
                  <span class="text-xs text-slate-600"
                    >Follow the first value in sequences (e.g., 32").</span
                  >
                </div>
              </label>
              <!-- Option 2: Medium -->
              <label
                class="flex items-start gap-3 p-3 cursor-pointer hover:bg-slate-50 border border-transparent hover:border-black transition-colors"
              >
                <input
                  class="mac-radio-custom mt-1"
                  name="size-selection"
                  type="radio"
                />
                <div class="flex flex-col">
                  <span class="text-sm chicago-vibe uppercase"
                    >Medium (2nd number)</span
                  >
                  <span class="text-xs text-slate-600"
                    >Follow the second value in sequences (e.g., 34").</span
                  >
                </div>
              </label>
              <!-- Option 3: Large -->
              <label
                class="flex items-start gap-3 p-3 cursor-pointer hover:bg-slate-50 border border-transparent hover:border-black transition-colors"
              >
                <input
                  class="mac-radio-custom mt-1"
                  name="size-selection"
                  type="radio"
                />
                <div class="flex flex-col">
                  <span class="text-sm chicago-vibe uppercase"
                    >Large (3rd number)</span
                  >
                  <span class="text-xs text-slate-600"
                    >Follow the third value in sequences (e.g., 36").</span
                  >
                </div>
              </label>
            </div>
          </div>
          <!-- Action Buttons -->
          <div class="flex justify-end gap-4 mt-8">
            <button
              class="mac-button px-8 py-2 text-sm chicago-vibe uppercase bg-white hover:bg-slate-100 active:bg-slate-200"
            >
              Cancel
            </button>
            <button
              class="mac-button px-8 py-2 text-sm chicago-vibe uppercase bg-black text-white hover:bg-slate-800"
            >
              Submit
            </button>
          </div>
        </div>
        <!-- Footer / Status Bar -->
        <div
          class="border-t border-black p-1 bg-slate-50 flex justify-between items-center px-4"
        >
          <span class="text-[10px] uppercase font-bold tracking-tighter"
            >System 7.5.3</span
          >
          <div class="flex gap-2">
            <div class="w-3 h-3 border border-black"></div>
            <div class="w-3 h-3 border border-black bg-black"></div>
          </div>
        </div>
      </div>
      <!-- Decorative "Desktop" Icon -->
      <div
        class="fixed bottom-8 right-8 flex flex-col items-center gap-1 group cursor-pointer"
      >
        <div
          class="w-12 h-12 bg-white border-2 border-black flex items-center justify-center group-hover:bg-slate-100"
        >
          <span class="material-symbols-outlined text-3xl">folder</span>
        </div>
        <span
          class="bg-black text-white px-2 py-0.5 text-[10px] chicago-vibe uppercase"
          >Patterns</span
        >
      </div>
      <div
        class="fixed top-8 right-8 flex flex-col items-center gap-1 group cursor-pointer"
      >
        <div
          class="w-12 h-12 bg-white border-2 border-black flex items-center justify-center group-hover:bg-slate-100"
        >
          <span class="material-symbols-outlined text-3xl">smart_toy</span>
        </div>
        <span
          class="bg-black text-white px-2 py-0.5 text-[10px] chicago-vibe uppercase"
          >AI Assistant</span
        >
      </div>
    </div>
  </body>
</html>
